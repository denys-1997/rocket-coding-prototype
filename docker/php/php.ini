memory_limit = 512M
upload_max_filesize = 25M
post_max_size = 25M
max_execution_time = 120
max_input_time = 120

date.timezone = UTC

opcache.enable = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.jit_buffer_size = 128M
opcache.jit = 1255

display_errors = Off
log_errors = On
error_log = /dev/stderr
